<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO アプリ</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <!-- Header Section -->
        <header class="app__header">
            <h1 class="app__title">TODO</h1>
            <form class="todo-input" id="todoForm">
                <input 
                    type="text" 
                    class="todo-input__field" 
                    id="todoInput"
                    placeholder="やることを入力してください..."
                    maxlength="200"
                    aria-label="新しいTODOを入力"
                    autocomplete="off"
                >
                <button type="submit" class="todo-input__button" aria-label="TODOを追加">
                    ＋
                </button>
            </form>
        </header>

        <!-- Main Content -->
        <main class="app__main">
            <!-- Filter Controls -->
            <nav class="filter-controls" id="filterControls" role="navigation" aria-label="TODOフィルター">
                <a href="#/" class="filter-controls__link filter-controls__link--active" data-filter="all">
                    すべて
                </a>
                <a href="#/active" class="filter-controls__link" data-filter="active">
                    進行中
                </a>
                <a href="#/completed" class="filter-controls__link" data-filter="completed">
                    完了済み
                </a>
            </nav>

            <!-- Todo List -->
            <section class="todo-list" aria-label="TODOリスト">
                <ul class="todo-list__items" id="todoList" role="list">
                    <!-- Todo items will be dynamically inserted here -->
                </ul>
                
                <!-- Empty state -->
                <div class="todo-list__empty" id="emptyState" style="display: none;">
                    <p class="todo-list__empty-text">TODOがありません</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app__footer">
            <div class="todo-stats">
                <span class="todo-stats__count" id="todoCount">0個のTODO</span>
                <button 
                    class="todo-stats__clear" 
                    id="clearCompleted"
                    type="button"
                    style="display: none;"
                >
                    完了済みを削除
                </button>
            </div>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
